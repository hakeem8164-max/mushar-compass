<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة بوصلة الاستراتيجية — مُشار</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  :root{
    --ink:#1a2b3c; --deep:#0d5566; --teal:#127a8a; --teal-soft:#e7f3f4;
    --accent:#2a93a3; --paper:#f4f8f9; --line:#d9e6e8; --muted:#6b7785;
    --ok:#2e8b6f; --warn:#c79a3e; --bad:#d9534f;
    --shadow:0 10px 40px -12px rgba(13,85,102,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Tajawal',sans-serif;background:var(--paper);color:var(--ink);line-height:1.7}
  .wrap{max-width:1200px;margin:0 auto;padding:0 20px}
  /* login */
  .login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(160deg,var(--deep),var(--teal))}
  .login-card{background:#fff;border-radius:20px;padding:40px;width:min(400px,90vw);box-shadow:0 20px 60px -20px rgba(0,0,0,.4);text-align:center}
  .login-card img{height:54px;margin-bottom:18px}
  .login-card h1{font-size:20px;color:var(--deep);margin-bottom:6px}
  .login-card p{color:var(--muted);font-size:14px;margin-bottom:22px}
  input,select{font-family:inherit;font-size:15px;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;width:100%;transition:.2s}
  input:focus,select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-soft)}
  .btn{font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;border:none;border-radius:11px;padding:12px 22px;transition:.2s}
  .btn-primary{background:linear-gradient(135deg,var(--deep),var(--teal));color:#fff;box-shadow:var(--shadow)}
  .btn-primary:hover{transform:translateY(-2px)}
  .btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--teal)}
  /* header */
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 0;position:sticky;top:0;z-index:30}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px}
  .topbar img{height:38px}
  .topbar .title{font-weight:800;color:var(--deep);font-size:17px}
  /* stats */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:24px 0}
  .stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
  .stat .n{font-size:30px;font-weight:800;color:var(--deep)}
  .stat .l{color:var(--muted);font-size:14px;margin-top:2px}
  /* charts */
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
  .chart-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
  .chart-card h3{font-size:15px;margin-bottom:14px;color:var(--ink)}
  /* filters */
  .filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center}
  .filters input,.filters select{width:auto;min-width:150px;flex:0 0 auto}
  /* table */
  .table-card{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:13px 14px;text-align:right;border-bottom:1px solid var(--line)}
  th{background:var(--teal-soft);color:var(--deep);font-weight:700;font-size:13px;white-space:nowrap}
  tr:hover td{background:#fafdfd;cursor:pointer}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
  .pill{display:inline-block;padding:3px 10px;border-radius:8px;font-size:12px;background:var(--teal-soft);color:var(--teal);font-weight:600}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(13,43,60,.55);display:grid;place-items:center;z-index:50;padding:20px}
  .modal{background:#fff;border-radius:18px;max-width:760px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.5)}
  .modal-head{position:sticky;top:0;background:linear-gradient(135deg,var(--deep),var(--teal));color:#fff;padding:22px 26px;display:flex;justify-content:space-between;align-items:start;gap:16px}
  .modal-head h2{font-size:20px}
  .modal-head .x{cursor:pointer;background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:10px;font-size:18px}
  .modal-body{padding:26px}
  .field{padding:11px 0;border-bottom:1px dashed var(--line)}
  .field .k{font-size:13px;color:var(--muted);margin-bottom:2px}
  .field .v{font-size:15px;color:var(--ink);font-weight:500}
  .sec-divider{font-weight:800;color:var(--deep);margin:20px 0 6px;font-size:15px;border-inline-start:4px solid var(--teal);padding-inline-start:10px}
  .readiness-box{display:flex;align-items:center;gap:16px;background:var(--teal-soft);border-radius:14px;padding:18px;margin-bottom:10px}
  .readiness-box .circle{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px;flex:none}
  .empty{text-align:center;padding:50px;color:var(--muted)}
  .loading{text-align:center;padding:60px;color:var(--muted)}
  @media(max-width:760px){.charts{grid-template-columns:1fr}.hide-sm{display:none}}
</style>
<script>
window.addEventListener('error',function(e){
  var r=document.getElementById('root');
  if(r && !r.innerHTML.trim()){
    r.innerHTML='<div style="max-width:520px;margin:80px auto;background:#fff;border:1px solid #d9e6e8;border-radius:16px;padding:30px;text-align:center;font-family:Tajawal,sans-serif">'+
    '<h2 style="color:#0d5566;margin-bottom:10px">تعذّر تحميل اللوحة</h2>'+
    '<p style="color:#6b7785;line-height:1.8">قد يكون السبب ضعف الاتصال أو فتح الملف مباشرة من الجهاز.<br>افتح اللوحة من رابط Vercel، وتأكد من اتصالك بالإنترنت، ثم حدّث الصفحة.</p>'+
    '<p style="color:#d9534f;font-size:12px;margin-top:14px;direction:ltr">'+(e.message||'')+'</p></div>';
  }
});
</script>

const A=(v)=>Array.isArray(v)?v.join('، '):(v||'—');
const rColor=(s)=> s>=75?'#2e8b6f': s>=50?'#c79a3e':'#d9534f';

function Login({onOk}){
  const [p,setP]=useState(''); const [err,setErr]=useState(false);
  const go=()=>{ if(p===PASSWORD){sessionStorage.setItem('mushar_admin','1');onOk()} else setErr(true) };
  return (
    <div className="login">
      <div className="login-card">
        <img src={LOGO}/>
        <h1>لوحة بوصلة الاستراتيجية</h1>
        <p>أدخل كلمة المرور للدخول</p>
        <input type="password" value={p} placeholder="كلمة المرور"
          onChange={e=>{setP(e.target.value);setErr(false)}}
          onKeyDown={e=>e.key==='Enter'&&go()} style={{marginBottom:14,textAlign:'center'}}/>
        {err&&<div style={{color:'#d9534f',fontSize:13,marginBottom:12}}>كلمة المرور غير صحيحة</div>}
        <button className="btn btn-primary" style={{width:'100%'}} onClick={go}>دخول</button>
      </div>
    </div>
  );
}

function Stat({n,l}){return <div className="stat"><div className="n">{n}</div><div className="l">{l}</div></div>}

function Chart({type,data,options,title}){
  const ref=useRef(); const inst=useRef();
  useEffect(()=>{
    if(inst.current)inst.current.destroy();
    inst.current=new window.Chart(ref.current,{type,data,options});
    return ()=>inst.current&&inst.current.destroy();
  },[JSON.stringify(data)]);
  return <div className="chart-card"><h3>{title}</h3><canvas ref={ref} height="160"></canvas></div>;
}

function Detail({row,onClose}){
  const rd={score:row.readiness_score,level:row.readiness_level,notes:row.readiness_notes||[]};
  const F=({k,v})=> <div className="field"><div className="k">{k}</div><div className="v">{v||'—'}</div></div>;
  const isPriv=row.entity_type==='خاص';
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div><h2>{row.entity_name||'—'}</h2>
            <div style={{opacity:.85,fontSize:14,marginTop:4}}>{row.entity_type} · {row.sector}</div></div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" onClick={()=>exportPDF(row)} style={{padding:'8px 14px',fontSize:13}}>PDF</button>
            <button className="x" onClick={onClose}>×</button>
          </div>
        </div>
        <div className="modal-body">
          {rd.score!=null&&<div className="readiness-box">
            <div className="circle" style={{background:rColor(rd.score)}}>{rd.score}</div>
            <div><div style={{fontWeight:800,fontSize:17,color:rColor(rd.score)}}>{rd.level}</div>
              <div style={{fontSize:13,color:'var(--muted)'}}>مؤشر الجاهزية الداخلي</div></div>
          </div>}
          {rd.notes&&rd.notes.length>0&&<div style={{marginBottom:8}}>
            <div style={{fontWeight:700,fontSize:14,margin:'8px 0 4px'}}>نقاط تحتاج انتباهًا:</div>
            <ul style={{paddingInlineStart:18,color:'var(--muted)',fontSize:14}}>{rd.notes.map((n,i)=><li key={i}>{n}</li>)}</ul>
          </div>}

          <div className="sec-divider">بيانات التواصل</div>
          <F k="المسؤول" v={row.contact_name}/><F k="المسمى" v={row.contact_title}/>
          <F k="البريد" v={row.contact_email}/><F k="الجوال" v={row.contact_phone}/>

          <div className="sec-divider">التعريف بالمنظمة</div>
          <F k="نوع المنظمة" v={row.entity_type}/><F k="القطاع" v={row.sector}/>
          <F k="سنة التأسيس" v={row.founded}/><F k="عدد الموظفين" v={row.employees}/>
          {isPriv&&<F k="رأس المال" v={row.capital}/>}
          <F k="المدينة" v={row.hq_city}/>
          <F k="فروع" v={row.has_branches==='نعم'?`نعم (${row.branches_count||'?'}) — ${A(row.regions)}`:row.has_branches}/>
          <F k="متجر إلكتروني" v={row.has_ecommerce}/>

          {isPriv&&<>
            <div className="sec-divider">ملف النشاط التجاري</div>
            <F k="ماذا يقدّمون" v={row.biz_offering}/><F k="الوصف" v={row.biz_description}/>
            <F k="التصنيع" v={row.has_manufacturing}/><F k="الموردون" v={row.suppliers}/>
            <F k="شركات شقيقة" v={row.group_structure==='نعم'?`نعم (${row.group_count||'?'})`:row.group_structure}/>
            <F k="نوع العملاء" v={row.customer_type}/><F k="حجم القاعدة" v={row.customer_base}/>
            <F k="قنوات البيع" v={A(row.sales_channels)}/>
          </>}

          <div className="sec-divider">الهدف والتوقعات</div>
          <F k="الهدف" v={row.strategy_goal}/><F k="الجهة الطالبة" v={row.requester}/>
          <F k="جهة الاعتماد" v={row.approver}/><F k="القرارات المتوقعة" v={row.key_decisions}/>
          <F k="صورة النجاح" v={row.success_vision}/><F k="الألم/الدافع" v={row.pain_point}/>
          <F k="الأفق الزمني" v={row.horizon}/><F k="الميزانية" v={row.budget}/>
          <F k="الموعد" v={row.deadline}/><F k="أصحاب المصلحة" v={A(row.stakeholders)}/>
          <F k="توفّر الفريق" v={row.team_availability}/>

          <div className="sec-divider">الوضع الحالي</div>
          <F k="رؤية ورسالة" v={row.has_vision==='نعم'?`نعم (${row.vision_update||''})`:row.has_vision}/>
          <F k="خطة لم تُنفّذ" v={row.prev_strategy==='نعم'?`نعم — ${row.prev_reason||''}`:row.prev_strategy}/>
          <F k="التزام القيادة" v={row.leadership_commitment}/><F k="فريق داخلي" v={row.internal_team}/>
          <F k="تجربة استشارية سابقة" v={row.prev_consultant==='نعم'?`نعم — ${row.prev_consultant_note||''}`:row.prev_consultant}/>
          <F k="النضج: مالي" v={row.m_financial}/><F k="النضج: عملاء" v={row.m_customer}/>
          <F k="النضج: عمليات" v={row.m_process}/><F k="النضج: كوادر" v={row.m_learning}/>
          <F k="البيانات المتاحة" v={A(row.data_available)}/>
          <F k="المقارنة المرجعية" v={row.benchmarking==='نعم'?`نعم — ${row.benchmark_targets||''}`:row.benchmarking}/>
          <F k="التحديات" v={row.challenges}/>

          {isPriv&&<>
            <div className="sec-divider">تحليل القطاع الخاص</div>
            <F k="التفصيل المالي" v={row.financial_depth}/><F k="تفصيل البيانات" v={row.financial_granularity}/>
            <F k="توقعات مالية" v={row.financial_forecast}/><F k="مؤشرات مالية" v={A(row.fin_priorities)}/>
            <F k="تقييم الفروع" v={row.branch_depth}/><F k="الأنظمة" v={A(row.systems)}/>
            <F k="التحدي الأكبر" v={row.main_challenge}/><F k="المنافسون" v={row.competitors}/>
          </>}

          <div className="sec-divider">لمسة أخيرة</div>
          <F k="خارج النطاق" v={row.out_of_scope}/><F k="مستخدم المخرج" v={row.output_user}/>
          <F k="الشرط الأهم" v={row.must_have}/><F k="ملاحظات" v={row.open_notes}/>
        </div>
      </div>
    </div>
  );
}

function exportPDF(row){
  const {jsPDF}=window.jspdf; const doc=new jsPDF();
  // jsPDF لا يدعم العربية بخطوطه الافتراضية جيدًا — نصدّر ملخصًا منظّمًا بالإنجليزية للحقول + القيم العربية كنص
  doc.setFontSize(16); doc.text("Mushar — Strategy Compass Report",105,18,{align:'center'});
  doc.setFontSize(10); doc.setTextColor(120);
  doc.text(new Date(row.created_at).toLocaleString('en-GB'),105,25,{align:'center'});
  let y=38; doc.setTextColor(20); doc.setFontSize(11);
  const line=(k,v)=>{ if(y>275){doc.addPage();y=20} doc.setFont(undefined,'bold');doc.text(k+":",16,y);
    doc.setFont(undefined,'normal'); const t=doc.splitTextToSize(String(v||'-'),120); doc.text(t,60,y); y+=Math.max(7,t.length*6); };
  line("Entity",row.entity_name); line("Type",row.entity_type); line("Sector",row.sector);
  line("Employees",row.employees); line("City",row.hq_city);
  line("Readiness",`${row.readiness_score} - ${row.readiness_level}`);
  line("Goal",row.strategy_goal); line("Budget",row.budget); line("Deadline",row.deadline);
  line("Key decisions",row.key_decisions); line("Success vision",row.success_vision);
  line("Must have",row.must_have); line("Contact",`${row.contact_name||''} / ${row.contact_email||''}`);
  doc.save(`mushar-${(row.entity_name||'client').replace(/\s/g,'_')}.pdf`);
}

function exportExcel(rows){
  const flat=rows.map(r=>({
    'التاريخ':new Date(r.created_at).toLocaleString('ar'),'المنظمة':r.entity_name,'النوع':r.entity_type,'القطاع':r.sector,
    'الموظفون':r.employees,'المدينة':r.hq_city,'الجاهزية':r.readiness_score,'المستوى':r.readiness_level,
    'الهدف':r.strategy_goal,'الميزانية':r.budget,'القرارات':r.key_decisions,'الشرط الأهم':r.must_have,
    'المسؤول':r.contact_name,'البريد':r.contact_email,'الجوال':r.contact_phone
  }));
  const ws=XLSX.utils.json_to_sheet(flat); const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'الاستبيانات'); XLSX.writeFile(wb,'mushar-submissions.xlsx');
}

function Dashboard(){
  const [rows,setRows]=useState(null); const [sel,setSel]=useState(null);
  const [loadErr,setLoadErr]=useState(null);
  const [q,setQ]=useState(''); const [ft,setFt]=useState(''); const [fr,setFr]=useState('');
  useEffect(()=>{ (async()=>{
    try{
      const {data,error}=await sb.from('submissions').select('*').order('created_at',{ascending:false});
      if(error){setLoadErr(error.message);setRows([])} else setRows(data||[]);
    }catch(e){setLoadErr(String(e.message||e));setRows([])}
  })() },[]);

  const filtered=useMemo(()=>{
    if(!rows)return [];
    return rows.filter(r=>{
      if(q&&!(r.entity_name||'').includes(q)&&!(r.contact_name||'').includes(q))return false;
      if(ft&&r.entity_type!==ft)return false;
      if(fr==='high'&&!(r.readiness_score>=75))return false;
      if(fr==='mid'&&!(r.readiness_score>=50&&r.readiness_score<75))return false;
      if(fr==='low'&&!(r.readiness_score<50))return false;
      return true;
    });
  },[rows,q,ft,fr]);

  if(rows===null)return <div className="loading">جارٍ تحميل البيانات…</div>;

  const avg=rows.length?Math.round(rows.reduce((a,r)=>a+(r.readiness_score||0),0)/rows.length):0;
  const high=rows.filter(r=>r.readiness_score>=75).length;
  // توزيع القطاعات
  const bySector={}; rows.forEach(r=>{const k=r.sector||'غير محدد';bySector[k]=(bySector[k]||0)+1});
  const byType={}; rows.forEach(r=>{const k=r.entity_type||'غير محدد';byType[k]=(byType[k]||0)+1});

  const logout=()=>{sessionStorage.removeItem('mushar_admin');location.reload()};

  return (
    <div>
      <div className="topbar"><div className="wrap">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <img src={LOGO}/><span className="title">لوحة بوصلة الاستراتيجية</span>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost" onClick={()=>exportExcel(filtered)} style={{fontSize:13}}>تصدير Excel</button>
          <button className="btn btn-ghost" onClick={logout} style={{fontSize:13}}>خروج</button>
        </div>
      </div></div>

      <div className="wrap">
        {loadErr&&<div style={{background:'#f8e0df',border:'1px solid #d9534f',color:'#922',borderRadius:12,padding:'12px 16px',margin:'16px 0',fontSize:14}}>
          تعذّر تحميل البيانات من قاعدة البيانات: {loadErr}
        </div>}
        <div className="stats">
          <Stat n={rows.length} l="إجمالي الاستبيانات"/>
          <Stat n={avg} l="متوسط الجاهزية"/>
          <Stat n={high} l="جاهزية عالية (75+)"/>
          <Stat n={Object.keys(bySector).length} l="عدد القطاعات"/>
        </div>

        <div className="charts">
          <Chart title="توزيع حسب القطاع" type="doughnut"
            data={{labels:Object.keys(bySector),datasets:[{data:Object.values(bySector),
              backgroundColor:['#0d5566','#127a8a','#2a93a3','#5bb3c0','#8fd0d9','#c79a3e','#b0a99a']}]}}
            options={{plugins:{legend:{position:'bottom',labels:{font:{family:'Tajawal'}}}}}}/>
          <Chart title="توزيع حسب النوع" type="bar"
            data={{labels:Object.keys(byType),datasets:[{label:'عدد',data:Object.values(byType),
              backgroundColor:'#127a8a',borderRadius:8}]}}
            options={{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}}/>
        </div>

        <div className="filters">
          <input placeholder="بحث باسم المنظمة أو المسؤول…" value={q} onChange={e=>setQ(e.target.value)}/>
          <select value={ft} onChange={e=>setFt(e.target.value)}>
            <option value="">كل الأنواع</option><option>حكومي</option><option value="خاص">قطاع خاص</option>
            <option>غير ربحي</option><option>شبه حكومي</option>
          </select>
          <select value={fr} onChange={e=>setFr(e.target.value)}>
            <option value="">كل مستويات الجاهزية</option>
            <option value="high">عالية (75+)</option><option value="mid">متوسطة (50-74)</option><option value="low">منخفضة (&lt;50)</option>
          </select>
          <span style={{color:'var(--muted)',fontSize:14}}>{filtered.length} نتيجة</span>
        </div>

        <div className="table-card" style={{marginBottom:40}}>
          {filtered.length===0? <div className="empty">لا توجد استبيانات مطابقة بعد.</div> :
          <table>
            <thead><tr>
              <th>المنظمة</th><th>النوع</th><th className="hide-sm">القطاع</th>
              <th>الجاهزية</th><th className="hide-sm">الهدف</th><th className="hide-sm">التاريخ</th>
            </tr></thead>
            <tbody>{filtered.map(r=>(
              <tr key={r.id} onClick={()=>setSel(r)}>
                <td style={{fontWeight:700}}>{r.entity_name||'—'}</td>
                <td><span className="pill">{r.entity_type||'—'}</span></td>
                <td className="hide-sm">{r.sector||'—'}</td>
                <td><span className="badge" style={{background:rColor(r.readiness_score||0),color:'#fff'}}>{r.readiness_score??'—'}</span></td>
                <td className="hide-sm" style={{maxWidth:220,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.strategy_goal||'—'}</td>
                <td className="hide-sm" style={{color:'var(--muted)',fontSize:13}}>{new Date(r.created_at).toLocaleDateString('ar')}</td>
              </tr>
            ))}</tbody>
          </table>}
        </div>
      </div>
      {sel&&<Detail row={sel} onClose={()=>setSel(null)}/>}
    </div>
  );
}

function App(){
  const [ok,setOk]=useState(sessionStorage.getItem('mushar_admin')==='1');
  return ok? <Dashboard/> : <Login onOk={()=>setOk(true)}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
